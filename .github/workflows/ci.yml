name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Derive gosec package manifest
        run: |
          mkdir -p .github/tmp
          ./scripts/gosec-first-party-packages.sh > .github/tmp/gosec-packages.txt
          echo "Scanning packages:"
          cat .github/tmp/gosec-packages.txt

      - name: Run gosec
        run: |
          # Limit the scan to first-party histkit packages derived from go list so repo-local cache directories
          # under the checkout are not treated as source.
          mapfile -t packages < .github/tmp/gosec-packages.txt
          "$(go env GOPATH)/bin/gosec" -tests=false "${packages[@]}"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Build binary
        run: go build -o ./histkit ./cmd/histkit

      - name: Smoke test binary help
        run: |
          ./histkit --help
          ./histkit doctor --help
